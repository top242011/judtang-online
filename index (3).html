<script>
/* =========================================================
   จัดตั้ง ออนไลน์ — เกมจำลองการเมืองไทยหลายผู้เล่น (Firebase)
   ========================================================= */

/* ---------- 1. FIREBASE CONFIG — วางค่าของคุณตรงนี้ ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyBtoUszWF3Fg1AsVOk7iekFeyPesfIooj8",

  firebase.initializeApp(firebaseConfig);
  db=firebase.firestore();

const ROOMS = 'jadtang_rooms';

/* ---------- helpers ---------- */
const clamp=(v,min=0,max=100)=>Math.max(min,Math.min(max,v));
const fmt=n=>Math.round(n).toLocaleString('en-US');
function computeDeficitCrisis(treasury,deficitStreak,national){
  if(treasury<0){
    const streak=deficitStreak+1;
    const trustPenalty=clamp(3+streak*2,0,20);
    const unrestPenalty=clamp(2+streak*1.5,0,15);
    return {
      deficitStreak:streak,
      national:{
        economy:national.economy,
        trust:clamp(national.trust-trustPenalty),
        unrest:clamp(national.unrest+unrestPenalty),
      },
    };
  }
  return {deficitStreak:0,national:{...national}};
}
function countBadDecisions(decisionHistory){
  return (decisionHistory||[]).filter(d=>d.trustDelta<0).length;
}
function countGuiltyIncidents(corruptionIncidents,targetId){
  return (corruptionIncidents||[]).filter(d=>d.targetId===targetId && d.choiceIndex===1).length;
}
function computeCourtVerdictProbability(corruptionIncidents,targetId){
  return clamp(0.4+0.15*countGuiltyIncidents(corruptionIncidents,targetId),0,0.95);
}
function computeNoConfidenceEffect(baseEffect,choiceIdx,decisionHistory){
  const badCount=countBadDecisions(decisionHistory);
  const eff={...baseEffect};
  if(choiceIdx===0){
    eff.trust=Math.max(0,(eff.trust||0)-badCount);
  } else {
    eff.trust=(eff.trust||0)-badCount*2;
  }
  return eff;
}

const BILL_MAGNITUDE={
  fiscal:{mild:{treasury:5,economy:1},moderate:{treasury:10,economy:2},aggressive:{treasury:18,economy:4,trust:-2}},
  social:{mild:{trust:3,unrest:-2},moderate:{trust:6,unrest:-4},aggressive:{trust:10,unrest:-7,satisfactionAll:3}},
  security:{mild:{unrest:-3},moderate:{unrest:-6,trust:2},aggressive:{unrest:-10,trust:4,regions:5}},
};
function computeBillMagnitude(category,intensity,direction){
  const base=BILL_MAGNITUDE[category][intensity];
  const eff={};
  Object.keys(base).forEach(k=>{ eff[k]=base[k]*(direction<0?-1:1); });
  return eff;
}
function tallySelectVote(bill,slots,lastElectionResults,pmId){
  const seatsOf=id=>(lastElectionResults.find(x=>x.id===id)?.seats||0);
  const totals={};
  Object.entries(bill.selectVotes||{}).forEach(([voterId,intensity])=>{
    totals[intensity]=(totals[intensity]||0)+seatsOf(voterId);
  });
  const entries=Object.entries(totals);
  if(!entries.length) return null;
  let best=entries[0], tied=[entries[0]];
  entries.forEach(e=>{ if(e[1]>best[1]){ best=e; tied=[e]; } else if(e[1]===best[1] && e!==best) tied.push(e); });
  if(tied.length>1){
    const pmVote=bill.selectVotes[pmId];
    if(pmVote && tied.some(t=>t[0]===pmVote)) return pmVote;
  }
  return best[0];
}
function tallyPassVote(bill,slots,lastElectionResults,pmId){
  const seatsOf=id=>(lastElectionResults.find(x=>x.id===id)?.seats||0);
  let yes=0,no=0;
  Object.entries(bill.passVotes||{}).forEach(([voterId,v])=>{
    if(v==='yes') yes+=seatsOf(voterId); else no+=seatsOf(voterId);
  });
  if(yes===no){ return bill.passVotes[pmId]==='yes'; }
  return yes>no;
}
function genRoomCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<4;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function getOrCreatePlayerId(){
  let id=localStorage.getItem('jadtang_pid');
  if(!id){ id='p_'+Math.random().toString(36).slice(2,10); localStorage.setItem('jadtang_pid',id); }
  return id;
}
const MY_ID=getOrCreatePlayerId();

/* ---------- game data ---------- */
const REGIONS=[

  {id:'isaan',name:'ภาคอีสาน',seats:130,leaning:{economy:-60,reform:10,security:-20}},
  {id:'central',name:'ภาคกลาง',seats:90,leaning:{economy:10,reform:-10,security:20}},
  {id:'bangkok',name:'กรุงเทพมหานคร',seats:60,leaning:{economy:0,reform:60,security:-30}},
  {id:'south',name:'ภาคใต้',seats:50,leaning:{economy:20,reform:-40,security:40}},

const TOTAL_SEATS=REGIONS.reduce((s,r)=>s+r.seats,0);
const MAJORITY=Math.floor(TOTAL_SEATS/2)+1;

const MINISTRIES=[

  {id:'finance',name:'กระทรวงการคลัง',weight:3},
  {id:'defense',name:'กระทรวงกลาโหม',weight:3},
  {id:'foreign',name:'กระทรวงการต่างประเทศ',weight:2},
  {id:'education',name:'กระทรวงศึกษาธิการ',weight:2},
  {id:'health',name:'กระทรวงสาธารณสุข',weight:2},
  {id:'agri',name:'กระทรวงเกษตรและสหกรณ์',weight:2},
  {id:'commerce',name:'กระทรวงพาณิชย์',weight:2},
  {id:'transport',name:'กระทรวงคมนาคม',weight:2},
  {id:'energy',name:'กระทรวงพลังงาน',weight:2},
  {id:'justice',name:'กระทรวงยุติธรรม',weight:1},
  {id:'digital',name:'กระทรวงดิจิทัลเพื่อเศรษฐกิจและสังคม',weight:1},
];
const TOTAL_WEIGHT=MINISTRIES.reduce((s,m)=>s+m.weight,0);

const PARTY_TEMPLATES=[
  {name:'พรรคไทยรุ่งเรือง',color:'#8B6F2E',policy:{economy:40,reform:-70,security:60},billStance:{fiscal:30,social:-40,security:60}},
  {name:'พรรคประชาชนก้าวใหม่',color:'#2E8B74',policy:{economy:-20,reform:90,security:-50},billStance:{fiscal:-50,social:70,security:-60}},
  {name:'พรรคชาวนาไทยเข้มแข็ง',color:'#3F6B2E',policy:{economy:-70,reform:10,security:0},billStance:{fiscal:-80,social:20,security:0}},

  {name:'พรรคเศรษฐกิจใหม่',color:'#2E5A8B',policy:{economy:80,reform:20,security:10},billStance:{fiscal:70,social:10,security:10}},
  {name:'พรรคประชาธรรมใหม่',color:'#8B4A2E',policy:{economy:0,reform:40,security:20},billStance:{fiscal:0,social:30,security:20}},

function policyDistance(a,b){
  const dx=(a.economy-b.economy)/100, dy=(a.reform-b.reform)/100, dz=(a.security-b.security)/100;
  return Math.sqrt(dx*dx+dy*dy+dz*dz);
}
function distanceTag(d){
  if(d<0.5) return {label:'ใกล้เคียง',cls:'close'};
  if(d<1.0) return {label:'ปานกลาง',cls:'medium'};
  return {label:'ห่างไกล',cls:'far'};
}

/* ---------- seat chart svg ---------- */
function seatChartSVG(partyList,opts={}){
  const width=opts.width||600, height=opts.height||300;
  const cx=width/2, cy=height-14;
  const rows=8, rMin=40, rMax=height-30;
  const radii=[]; for(let i=0;i<rows;i++) radii.push(rMin+(rMax-rMin)*i/(rows-1));
  const total=partyList.reduce((s,p)=>s+p.seats,0);
  if(total<=0) return `<svg viewBox="0 0 ${width} ${height}" class="seat-chart"></svg>`;
  const sumR=radii.reduce((a,b)=>a+b,0);
  let rowSeats=radii.map(r=>Math.round(total*r/sumR));
  let diff=total-rowSeats.reduce((a,b)=>a+b,0);
  rowSeats[rowSeats.length-1]+=diff;
  let positions=[];
  radii.forEach((r,ri)=>{
    const n=Math.max(0,rowSeats[ri]);
    for(let j=0;j<n;j++){ const t=n===1?0.5:j/(n-1); positions.push({r,t}); }
  });
  positions.sort((a,b)=>a.t-b.t);
  const sortedParties=[...partyList].sort((a,b)=>(a.economy??0)-(b.economy??0));
  let colorSeq=[];
  sortedParties.forEach(p=>{ for(let i=0;i<p.seats;i++) colorSeq.push(p.color); });
  let dots=[];
  positions.forEach((pos,idx)=>{
    const angle=Math.PI*(0.06+0.88*pos.t);
    const x=cx+pos.r*Math.cos(angle);
    const y=cy-pos.r*Math.sin(angle);
    const color=colorSeq[idx]||'#888';
    dots.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5.2" fill="${color}"/>`);
  });
  return `<svg viewBox="0 0 ${width} ${height}" class="seat-chart">${dots.join('')}</svg>`;
}

function stampAndThen(text,cb){
  const overlay=document.createElement('div');
  overlay.className='stamp-overlay';
  overlay.innerHTML=`<div class="stamp-mark">${text}</div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{ overlay.remove(); if(cb) cb(); },520);
}

function mySlot(){
  if(!ui.room) return null;
  return ui.room.slots.find(s=>s.claimedBy===MY_ID)||null;
}
function isHost(){ return ui.room && ui.room.hostId===MY_ID; }
function claimedSlots(){ return ui.room ? ui.room.slots.filter(s=>s.claimedBy) : []; }

function subscribeRoom(code){
  if(ui.unsub) ui.unsub();
  ui.unsub = db.collection(ROOMS).doc(code).onSnapshot(snap=>{
    if(!snap.exists){ ui.room=null; ui.screen='home'; render(); return; }
    ui.room=snap.data();
    if(ui.screen!=='game') ui.screen='game';
    render();
    maybeRunElection();
    runHostAutomation();
  });
  ui.roomCode=code;
  localStorage.setItem('jadtang_last_room',code);
}

function roomRef(){ return db.collection(ROOMS).doc(ui.roomCode); }

  const activeIdx=order.indexOf(activeKey);
  return `<div class="breadcrumb">${steps.map(([k,label],i)=>{
    let cls='step';
    if(k===activeKey) cls+=' active'; else if(i<activeIdx) cls+=' done';
    return `<div class="${cls}">${i+1}. ${label}</div>`;
  }).join('')}</div>`;
}
function regionLeaningLabel(r){
  const parts=[];
  parts.push(r.leaning.economy<-15?'เอียงประชานิยม':r.leaning.economy>15?'เอียงเสรีตลาด':'กลางด้านเศรษฐกิจ');
  parts.push(r.leaning.reform>15?'นิยมปฏิรูป':r.leaning.reform<-15?'นิยมสถาบันเดิม':'');
  parts.push(r.leaning.security>15?'เน้นความมั่นคง':r.leaning.security<-15?'สายเจรจา':'');
  return parts.filter(Boolean).join(' · ');
}
function gauge(label,value,inverse){
  value=clamp(value,0,100);
  let cls='good';
  if(inverse){ cls = value>65?'bad':value>35?'warn':'good'; } else { cls = value<35?'bad':value<65?'warn':'good'; }
  return `<div class="gauge"><div class="gauge-top"><span class="lbl">${label}</span><span class="val">${fmt(value)}</span></div><div class="gauge-bar"><div class="gauge-fill ${cls}" style="width:${value}%"></div></div></div>`;
}
function noConfidenceVotingPanel(r,mine,ev){
  const votes=r.noConfidenceVotes||{};
  const iAmVoter=mine&&r.coalitionSlots.includes(mine.id);
  const myVote=mine?votes[mine.id]:undefined;
  let seatsFor=[0,0];
  r.coalitionSlots.forEach(id=>{
    const idx=votes[id];
    if(idx===undefined) return;
    const seats=(r.lastElection.results.find(x=>x.id===id)?.seats||0);
    seatsFor[idx]+=seats;
  });
  const rows=r.coalitionSlots.map(id=>{
    const s=r.slots.find(x=>x.id===id);
    const idx=votes[id];
    const label=idx===undefined?'ยังไม่โหวต':ev.choices[idx].label;
    const cls=idx===undefined?'pending':(idx===0?'accepted':'declined');
    return `<div class="party-row"><span class="dot" style="background:${s.color}"></span><div class="info"><div class="pname">${s.name}${s.claimedBy?' ('+(s.playerDisplayName||'ไม่ทราบชื่อ')+')':' (AI)'}</div></div><span class="tag ${cls}">${label}</span></div>`;
  }).join('');
  return `
    ${iAmVoter&&myVote===undefined?`
      ${ev.choices.map((c,i)=>`<button class="event-choice" onclick="castNoConfidenceVote(${i})"><span class="clabel">${c.label}</span><span class="cdesc">${c.desc}</span></button>`).join('')}
    `:''}
    <div style="margin-top:14px;">${rows}</div>
    <div class="majority-line" style="margin-top:10px;">คะแนนเสียงพรรคร่วม: ${ev.choices[0].label} = <strong class="mono">${seatsFor[0]}</strong> ที่นั่ง &middot; ${ev.choices[1].label} = <strong class="mono">${seatsFor[1]}</strong> ที่นั่ง</div>
  `;
}

  const others=r.slots.filter(s=>s.id!==r.pm && (r.lastElection.results.find(x=>x.id===s.id)?.seats||0)>0);

  const chartList=[{id:pmSlot.id,name:pmSlot.name,color:pmSlot.color,seats:pmSeats,economy:pmSlot.policy.economy}];
  others.forEach(s=>{

      ${seatChartSVG(chartList)}

function billCategoryLabel(cat){ return cat==='fiscal'?'การคลัง':cat==='social'?'สังคม':'ความมั่นคง'; }
function billCard(r,mine,bill){
  const proposer=r.slots.find(s=>s.id===bill.proposerId);
  const dirLabel=bill.direction>0?'ขยาย':'รัดกุม';
  let body='';
  if(bill.stage==='amend'){
    const responded=mine && bill.respondedToAmend.includes(mine.id);
    const activeCount=r.slots.filter(s=>s.enabled!==false).length-1;
    body = mine && mine.id!==bill.proposerId && !responded
      ? `<div class="btn-row">
          ${['mild','moderate','aggressive'].map(i=>`<button class="btn btn-ghost-dark" onclick="submitAmendment('${bill.id}','${i}')">แก้เป็น ${i}</button>`).join('')}
          <button class="btn btn-ghost-dark" onclick="passOnAmendment('${bill.id}')">ไม่แก้ไข</button>
        </div>`
      : `<div class="tag medium">รอพรรคอื่นตอบสนอง (${bill.respondedToAmend.length}/${activeCount})</div>`;
  } else if(bill.stage==='select'){
    const voted=mine && bill.selectVotes[mine.id]!==undefined;
    const options=[...new Set(bill.amendments.map(a=>a.intensity))];
    body = mine && !voted
      ? `<div class="btn-row">${options.map(i=>`<button class="btn btn-ghost-dark" onclick="castSelectVote('${bill.id}','${i}')">เลือก ${i}</button>`).join('')}</div>`
      : `<div class="tag medium">โหวตเลือกเวอร์ชันแล้ว</div>`;
  } else if(bill.stage==='pass'){
    const voted=mine && bill.passVotes[mine.id]!==undefined;
    body = mine && !voted
      ? `<div class="btn-row"><button class="btn btn-stamp" onclick="castPassVote('${bill.id}','yes')">เห็นชอบ</button><button class="btn btn-ghost-dark" onclick="castPassVote('${bill.id}','no')">ไม่เห็นชอบ</button></div>`
      : `<div class="tag medium">โหวตผ่านแล้ว</div>`;
  }
  return `<div class="doc-card"><strong>${proposer?proposer.name:''}</strong> เสนอร่างกฎหมาย${billCategoryLabel(bill.category)} (${dirLabel})<div class="doc-sub">สถานะ: ${bill.stage}</div>${body}</div>`;
}
function billsPanel(r){
  const mine=mySlot();
  const canPropose = mine && !(r.pendingBills||[]).some(b=>b.proposerId===mine.id) && (r.pendingBills||[]).length<6;
  const proposeUI = canPropose ? `
    <div class="btn-row">
      ${['fiscal','social','security'].map(cat=>`
        <button class="btn btn-ghost-dark" onclick="proposeBill('${cat}',1)">เสนอ${billCategoryLabel(cat)} (ขยาย)</button>
        <button class="btn btn-ghost-dark" onclick="proposeBill('${cat}',-1)">เสนอ${billCategoryLabel(cat)} (รัดกุม)</button>
      `).join('')}
    </div>` : '';
  const activeLawsText = ['fiscal','social','security'].map(cat=>{
    const law=r.activeLaws && r.activeLaws[cat];
    return `${billCategoryLabel(cat)}: ${law?`${law.direction>0?'ขยาย':'รัดกุม'} (${law.intensity})`:'ไม่มี'}`;
  }).join(' · ');
  return `<div class="doc">
    <h3>ร่างกฎหมาย</h3>
    <div class="doc-sub">กฎหมายบังคับใช้อยู่: ${activeLawsText} &middot; หนี้สาธารณะ: ${Math.round(r.publicDebt||0)}</div>
    ${proposeUI}
    ${(r.pendingBills||[]).map(b=>billCard(r,mine,b)).join('')}
  </div>`;
}

/* ---------- election calc (multiplayer, run by transaction) ---------- */
function computeElectionFromSlots(slots,popularityBySlot,regionLeaning){
  popularityBySlot=popularityBySlot||{};
  regionLeaning=regionLeaning||{};
  const leaningOf=regId=>regionLeaning[regId]||REGIONS.find(x=>x.id===regId).leaning;
  const parties=slots.map(slot=>{
    let budget=slot.budget;
    if(!slot.claimedBy){
      const base={}; let sum=0;
      REGIONS.forEach(reg=>{ const d=policyDistance(slot.policy,leaningOf(reg.id)); const a=Math.max(5,100-d*70); base[reg.id]=a; sum+=a; });
      budget={}; REGIONS.forEach(reg=>{ budget[reg.id]=Math.round(100*base[reg.id]/sum); });
    }
    return {id:slot.id,name:slot.name,color:slot.color,policy:slot.policy,budget};
  });
  const regionSeats={}; const totals={}; parties.forEach(p=>totals[p.id]=0);
  REGIONS.forEach(reg=>{
    const appeals=parties.map(p=>{
      const d=policyDistance(p.policy,leaningOf(reg.id));
      let a=Math.max(3,100-d*55);
      const alloc=p.budget[reg.id]||0;
      a+=Math.sqrt(Math.max(0,alloc))*3;
      a+=((popularityBySlot[p.id]||{})[reg.id]||0)*0.5;
      a+=(Math.random()*16-8);
      return {id:p.id,appeal:Math.max(1,a)};
    });
    const eligible=appeals.filter(a=>a.appeal>=15);
    const pool=eligible.length?eligible:appeals;
    const sumApp=pool.reduce((s,a)=>s+a.appeal,0);
    const raw=pool.map(a=>({id:a.id,exact:reg.seats*a.appeal/sumApp}));
    const floors=raw.map(x=>({id:x.id,seats:Math.floor(x.exact),rem:x.exact-Math.floor(x.exact)}));
    let allocated=floors.reduce((s,f)=>s+f.seats,0);
    let remaining=reg.seats-allocated;
    floors.sort((a,b)=>b.rem-a.rem);
    for(let i=0;i<remaining;i++){ floors[i%floors.length].seats+=1; }
    const seatMap={};
    floors.forEach(f=>{ seatMap[f.id]=f.seats; totals[f.id]=(totals[f.id]||0)+f.seats; });
    regionSeats[reg.id]=seatMap;
  });
  const results=parties.map(p=>({id:p.id,name:p.name,color:p.color,seats:totals[p.id]||0}));
  results.sort((a,b)=>b.seats-a.seats);
  return {results,regionSeats};
}

function maybeRunElection(){
  const r=ui.room;
  if(r.phase!=='campaign'||r.electionLock) return;
  const humans=claimedSlots();
  if(humans.length===0 || !humans.every(s=>s.submitted)) return;
  db.runTransaction(t=>{
    return t.get(roomRef()).then(snap=>{
      const data=snap.data();
      if(data.phase!=='campaign'||data.electionLock) return;
      const humans2=data.slots.filter(s=>s.claimedBy);
      if(!humans2.every(s=>s.submitted)) return;
      const lastElection=computeElectionFromSlots(data.slots,data.popularity,data.regionLeaning);
      t.update(roomRef(),{electionLock:true,lastElection,phase:'election_result'});
    });
  });
}

function proceedAfterElection(formCoalition){
  db.runTransaction(t=>t.get(roomRef()).then(snap=>{
    const data=snap.data();
    if(data.phase!=='election_result') return;
    const winner=data.lastElection.results[0];
    if(winner.seats>=MAJORITY && !formCoalition){
      const coalitionParties=[{id:winner.id,satisfaction:100}];
      t.update(roomRef(),{phase:'cabinet',pm:winner.id,coalitionSlots:[winner.id],coalitionParties,cabinet:{},invitations:{}});
    } else {

function autoSuggestCabinet(){
  const r=ui.room;
  const parties=r.coalitionSlots.map(id=>({id,seats:(r.lastElection.results.find(x=>x.id===id)?.seats||0)}));
  const totalSeats=parties.reduce((s,p)=>s+p.seats,0)||1;
  const assigned={}; parties.forEach(p=>assigned[p.id]=0);
  const sorted=[...MINISTRIES].sort((a,b)=>b.weight-a.weight);
  const cabinet={};
  sorted.forEach(m=>{
    let best=null,bestScore=Infinity;
    parties.forEach(p=>{ const target=p.seats/totalSeats; const ratio=target>0?(assigned[p.id]/TOTAL_WEIGHT)/target:Infinity; if(ratio<bestScore){bestScore=ratio;best=p;} });
    cabinet[m.id]=best.id; assigned[best.id]+=m.weight;
  });
  roomRef().update({cabinet});
}
function computeCoalitionSatisfaction(r,cabinet){
  const totalSeats=r.coalitionSlots.reduce((s,id)=>s+(r.lastElection.results.find(x=>x.id===id)?.seats||0),0)||1;
  const assignedWeight={}; r.coalitionSlots.forEach(id=>assignedWeight[id]=0);
  MINISTRIES.forEach(m=>{ const o=cabinet[m.id]; if(o) assignedWeight[o]=(assignedWeight[o]||0)+m.weight; });
  const pmSlot=r.slots.find(s=>s.id===r.pm);
  return r.coalitionSlots.map(id=>{
    if(id===r.pm) return {id,satisfaction:100};
    const slot=r.slots.find(s=>s.id===id);
    const seats=(r.lastElection.results.find(x=>x.id===id)?.seats||0);
    const d=policyDistance(pmSlot.policy,slot.policy);
    const seatShare=seats/totalSeats;
    const weightShare=(assignedWeight[id]||0)/TOTAL_WEIGHT;
    const fairness=1-Math.min(1,Math.abs(weightShare-seatShare)*3);
    let sat=40+fairness*40-d*15;
    return {id,satisfaction:clamp(sat,5,95)};
  });
}
function confirmCabinet(){
  const r=ui.room;
  const isReshuffle=!!r.midTermReshuffle;
  const coalitionParties=computeCoalitionSatisfaction(r,r.cabinet);
  const nextR={...r,coalitionParties,usedEventIds:isReshuffle?r.usedEventIds:[]};
  const {event,ownerSlot}=drawEventForRoom(nextR);
  stampAndThen('แต่งตั้งแล้ว',()=>{
    roomRef().update({
      phase:'governing', coalitionParties,
      turn: isReshuffle ? r.turn : 1,
      usedEventIds: isReshuffle ? r.usedEventIds : [],
      currentEffectResult:null, currentEvent:event, currentEventOwnerSlot:ownerSlot,
      decisionHistory:[], noConfidenceVotes:{}, midTermReshuffle:false, pendingBills:[],
    });
  });
}

        choices:[{label:'รับทราบคำวินิจฉัยของศาล',desc:'ศาลได้พิจารณาและมีคำวินิจฉัยแล้ว',effect:{}}],
        _filedBy:r.queuedEvent.filedBy,
        _courtPetition:{targetId:r.queuedEvent.targetId},
      };

    }

    const event={
      ...base,
      title:'ญัตติอภิปรายไม่ไว้วางใจ (ยื่นโดย'+(filerSlot?filerSlot.name:'ฝ่ายค้าน')+')',
      _filedBy:r.queuedEvent.filedBy,
    };
    return {event,ownerSlot:r.pm};
  }
  let pool=EVENTS.filter(e=>!r.usedEventIds.includes(e.id));
  const assignedMinistries=MINISTRIES.filter(m=>r.cabinet[m.id]);
  if(assignedMinistries.length && !r.usedEventIds.includes('corruption')){
    const m=assignedMinistries[Math.floor(Math.random()*assignedMinistries.length)];
    const ownerId=r.cabinet[m.id];
    const owner=r.slots.find(s=>s.id===ownerId);
    pool=pool.concat([{
      id:'corruption', title:'เรื่องอื้อฉาวทุจริตใน'+m.name,
      desc:`มีรายงานข่าวการทุจริตจัดซื้อจัดจ้างใน${m.name} ซึ่งอยู่ภายใต้การกำกับดูแลของ${owner?owner.name:'พรรคร่วมรัฐบาล'} สื่อมวลชนจับตาอย่างใกล้ชิด`,
      _corruptionTarget: ownerId,
      choices:[
        {label:'ตั้งกรรมการสอบสวนอิสระ',desc:'สร้างความโปร่งใส แต่กระทบความสัมพันธ์กับพรรคร่วม',effect:{trust:8,treasury:-5,satisfactionParty:{id:ownerId,val:-15}}},
        {label:'ปกป้องพรรคร่วมรัฐบาล ไม่ตั้งกรรมการ',desc:'รักษาความสัมพันธ์ในรัฐบาล แต่เสี่ยงเสียความเชื่อมั่นสาธารณะ',effect:{trust:-15,unrest:8,satisfactionParty:{id:ownerId,val:10}}},
      ]
    }]);
  }
  if(!pool.length) pool=EVENTS;
  const event=pool[Math.floor(Math.random()*pool.length)];
  let ownerSlot=r.pm;
  if(event.id!=='corruption'){
    const mid=MINISTRY_EVENT_MAP[event.id];
    if(mid){
      const holder=r.cabinet[mid];
      if(holder && holder!==r.pm) ownerSlot=holder;
    }
  }
  return {event,ownerSlot};
}

// activeLaws' region-leaning drift is per-room and permanent, but REGIONS
// is a single module-level constant shared by every room open in this
// browser tab — mutating REGIONS.leaning directly would leak one room's
// legislative history into every other room. r.regionLeaning is the
// per-room override; every leaning read falls back to the REGIONS default
// when a room has no drift recorded yet for that region.
function regionLeaningFor(r,regId){
  const reg=REGIONS.find(x=>x.id===regId);
  return (r.regionLeaning && r.regionLeaning[regId]) || reg.leaning;
}
// Split from the debt step below on purpose: computeDeficitCrisis (existing
// fiscal-crisis feature) must still see a treasury that's allowed to go
// negative, or converting shortfall into debt here first would silently
// disable that escalating-penalty mechanic for every room.
function applyActiveLawEffects(r){
  let treasury=r.treasury, national={...r.national};
  const popularity={}; Object.keys(r.popularity||{}).forEach(k=>{ popularity[k]={...(r.popularity[k]||{})}; });
  const regionLeaning={}; REGIONS.forEach(reg=>{ regionLeaning[reg.id]={...regionLeaningFor(r,reg.id)}; });
  ['fiscal','social','security'].forEach(cat=>{
    const law=r.activeLaws && r.activeLaws[cat];
    if(!law) return;
    const eff=computeBillMagnitude(cat,law.intensity,law.direction);
    if(eff.treasury) treasury+=eff.treasury;
    if(eff.economy) national.economy=clamp(national.economy+eff.economy);
    if(eff.trust) national.trust=clamp(national.trust+eff.trust);
    if(eff.unrest) national.unrest=clamp(national.unrest+eff.unrest);
    if(eff.regions){
      const proposerSlot=r.slots.find(s=>s.id===law.proposerId);
      if(proposerSlot){
        popularity[law.proposerId]=popularity[law.proposerId]||{north:0,isaan:0,central:0,bangkok:0,south:0};
        let bestReg=REGIONS[0],bestFit=-Infinity;
        REGIONS.forEach(reg=>{ const d=policyDistance(proposerSlot.policy,regionLeaning[reg.id]); const fit=-d; if(fit>bestFit){bestFit=fit;bestReg=reg;} });
        popularity[law.proposerId][bestReg.id]=clamp((popularity[law.proposerId][bestReg.id]||0)+eff.regions,-60,60);
      }
    }
    if(cat==='fiscal'||cat==='security'){
      const axis=cat==='fiscal'?'economy':'security';
      const delta=0.3*(law.direction<0?-1:1);
      REGIONS.forEach(reg=>{ regionLeaning[reg.id][axis]=clamp(regionLeaning[reg.id][axis]+delta,-100,100); });
    }
  });
  return {treasury,national,popularity,regionLeaning};
}
// Applied AFTER computeDeficitCrisis has already seen (and reacted to) a
// possibly-negative treasury, so debt absorbs the shortfall without
// masking the existing crisis mechanic.
function applyPublicDebt(treasury,publicDebt,activeLaws){
  publicDebt=publicDebt||0;
  if(treasury<0){ publicDebt+=-treasury; treasury=0; }
  treasury=Math.max(0,treasury-Math.round(publicDebt*0.02));
  const fiscalLaw=activeLaws&&activeLaws.fiscal;
  if(fiscalLaw && fiscalLaw.direction<0 && fiscalLaw.intensity==='aggressive'){ publicDebt=Math.max(0,publicDebt-8); }
  return {treasury,publicDebt};
}

// Opposition parties don't sit idle: each turn they passively pick up a
// little of their own regional standing, scaled by how badly the
// government's national numbers are trending. Distributed across their
// strongest regions (by their own policy fit) so it still feels tied to
// what that party stands for, not just a flat freebie.
function computeOppositionDrift(r,newNational){
  const discontent = clamp((newNational.unrest-20)/60,0,1)*0.6 + clamp((50-newNational.trust)/50,0,1)*0.6;
  if(discontent<=0) return {};
  const oppSlots=r.slots.filter(s=>!r.coalitionSlots.includes(s.id));
  const drift={};
  oppSlots.forEach(s=>{
    const base={}; let sum=0;
    REGIONS.forEach(reg=>{ const d=policyDistance(s.policy,regionLeaningFor(r,reg.id)); const a=Math.max(5,100-d*70); base[reg.id]=a; sum+=a; });
    const gain={};
    REGIONS.forEach(reg=>{ gain[reg.id]=discontent*4*(base[reg.id]/sum); });
    drift[s.id]=gain;
  });
  return drift;
}

function chooseEvent(choiceIdx){
  const r=ui.room;
  const ev=r.currentEvent;
  if(ev.id==='courtcase'){ resolveCourtCase(); return; }
  const choice=ev.choices[choiceIdx];
  let eff=choice.effect;
  if(ev.id==='noconf'){
    eff=computeNoConfidenceEffect(eff,choiceIdx,r.decisionHistory);
  }
  const update={};
  update.treasury=r.treasury+(eff.treasury||0);
  update.national={
    economy:clamp(r.national.economy+(eff.economy||0)),
    trust:clamp(r.national.trust+(eff.trust||0)),
    unrest:clamp(r.national.unrest+(eff.unrest||0)),
  };

  // Attribute regional effects to whoever actually made the call (PM or the
  // coalition partner whose ministry it was) so momentum tracks the party
  // responsible, not a single shared national number.
  const ownerId=r.currentEventOwnerSlot||r.pm;
  const popularity={}; Object.keys(r.popularity||{}).forEach(k=>{ popularity[k]={...(r.popularity[k]||{})}; });
  if(eff.regions){
    popularity[ownerId]=popularity[ownerId]||{north:0,isaan:0,central:0,bangkok:0,south:0};
    Object.entries(eff.regions).forEach(([rid,val])=>{ popularity[ownerId][rid]=clamp((popularity[ownerId][rid]||0)+val,-60,60); });
  }
  // Opposition passive drift based on the post-effect national mood.
  const drift=computeOppositionDrift(r,update.national);
  Object.entries(drift).forEach(([slotId,gain])=>{
    popularity[slotId]=popularity[slotId]||{north:0,isaan:0,central:0,bangkok:0,south:0};
    Object.entries(gain).forEach(([rid,val])=>{ popularity[slotId][rid]=clamp((popularity[slotId][rid]||0)+val,-60,60); });
  });

  let coalitionParties=r.coalitionParties.map(p=>({...p}));
  if(eff.satisfactionAll) coalitionParties=coalitionParties.map(p=>p.id===r.pm?p:{...p,satisfaction:clamp(p.satisfaction+eff.satisfactionAll,0,100)});
  if(eff.satisfactionParty) coalitionParties=coalitionParties.map(p=>p.id===eff.satisfactionParty.id?{...p,satisfaction:clamp(p.satisfaction+eff.satisfactionParty.val,0,100)}:p);
  if(update.national.unrest>70) coalitionParties=coalitionParties.map(p=>p.id===r.pm?p:{...p,satisfaction:clamp(p.satisfaction-5,0,100)});
  if(update.national.trust<25) coalitionParties=coalitionParties.map(p=>p.id===r.pm?p:{...p,satisfaction:clamp(p.satisfaction-5,0,100)});

  const tags=[];
  if(eff.treasury) tags.push({sign:eff.treasury>0?'pos':'neg',text:`งบประมาณ ${eff.treasury>0?'+':''}${eff.treasury}`});
  if(eff.economy) tags.push({sign:eff.economy>0?'pos':'neg',text:`เศรษฐกิจ ${eff.economy>0?'+':''}${eff.economy}`});
  if(eff.trust) tags.push({sign:eff.trust>0?'pos':'neg',text:`ความเชื่อมั่น ${eff.trust>0?'+':''}${eff.trust}`});
  if(eff.unrest) tags.push({sign:eff.unrest<0?'pos':'neg',text:`ความไม่สงบ ${eff.unrest>0?'+':''}${eff.unrest}`});
  if(eff.satisfactionAll) tags.push({sign:eff.satisfactionAll>0?'pos':'neg',text:`ความพอใจพรรคร่วม ${eff.satisfactionAll>0?'+':''}${eff.satisfactionAll}`});
  if(eff.satisfactionParty) tags.push({sign:eff.satisfactionParty.val>0?'pos':'neg',text:`ความพอใจพรรคร่วม ${eff.satisfactionParty.val>0?'+':''}${eff.satisfactionParty.val}`});
  if(eff.regions) Object.entries(eff.regions).forEach(([rid,val])=>{ const rname=REGIONS.find(x=>x.id===rid).name; tags.push({sign:val>0?'pos':'neg',text:`${rname} ${val>0?'+':''}${val}`}); });

  // Filer's gambit: defending well in the chamber blunts the attack; a
  // dismissive response lets the opposition capitalize on it.
  if(ev._filedBy){
    const filerName=(r.slots.find(s=>s.id===ev._filedBy)||{}).name||'ฝ่ายค้าน';
    const filerDelta = choiceIdx===0 ? -3 : 8;
    popularity[ev._filedBy]=popularity[ev._filedBy]||{north:0,isaan:0,central:0,bangkok:0,south:0};
    REGIONS.forEach(reg=>{ popularity[ev._filedBy][reg.id]=clamp((popularity[ev._filedBy][reg.id]||0)+filerDelta,-60,60); });
    tags.push({sign:filerDelta>0?'pos':'neg',text:`ความนิยม ${filerName} ${filerDelta>0?'+':''}${filerDelta}`});
  }

  update.popularity=popularity;
  update.currentEffectResult={text:`เลือก: ${choice.label} — ${choice.desc}`,tags};
  update.usedEventIds=[...r.usedEventIds,ev.id];
  update.decisionHistory=[...(r.decisionHistory||[]),{eventId:ev.id,choiceIndex:choiceIdx,trustDelta:eff.trust||0,turn:r.turn,term:r.term}];
  update.noConfidenceVotes={};
  if(ev.id==='corruption'){
    update.corruptionIncidents=[...(r.corruptionIncidents||[]),{targetId:ev._corruptionTarget,term:r.term,turn:r.turn,choiceIndex:choiceIdx}];
  }
  if(ev._filedBy) update.queuedEvent=null;

  let leftAny=false;
  const afterCollapse=coalitionParties.map(p=>{
    if(p.id===r.pm||p.left) return p;
    let chance=0;
    if(p.satisfaction<10) chance=0.6; else if(p.satisfaction<25) chance=0.3;
    if(chance>0 && Math.random()<chance){ leftAny=true; return {...p,left:true}; }
    return p;
  });
  update.coalitionParties=afterCollapse;
  if(leftAny){
    const remaining=afterCollapse.filter(p=>!p.left).reduce((s,p)=>s+(r.lastElection.results.find(x=>x.id===p.id)?.seats||0),0);
    update.pendingCollapse = remaining<MAJORITY;
  } else { update.pendingCollapse=false; }

  roomRef().update(update);
}

function tallyNoConfidenceWinner(r){
  const votes=r.noConfidenceVotes||{};
  let seatsFor=[0,0];
  r.coalitionSlots.forEach(id=>{
    const idx=votes[id];
    if(idx===undefined) return;
    const seats=(r.lastElection.results.find(x=>x.id===id)?.seats||0);
    seatsFor[idx]+=seats;
  });
  if(seatsFor[0]>seatsFor[1]) return 0;
  if(seatsFor[1]>seatsFor[0]) return 1;
  return votes[r.pm];
}

function resolveCourtCase(){
  const r=ui.room;
  const ev=r.currentEvent;
  const targetId=ev._courtPetition.targetId;
  const filedBy=ev._filedBy;
  const targetSlot=r.slots.find(s=>s.id===targetId);
  const guilty=Math.random()<computeCourtVerdictProbability(r.corruptionIncidents,targetId);
  const update={usedEventIds:r.usedEventIds,queuedEvent:null};
  if(guilty){
    if(targetId===r.pm){
      update.pendingPmDisqualification={targetId};
      update.currentEffectResult={text:`ศาลรัฐธรรมนูญวินิจฉัยว่า ${targetSlot?targetSlot.name:''} มีความผิดจริง ต้องพ้นจากตำแหน่งนายกรัฐมนตรีทันที`,tags:[{sign:'neg',text:'นายกรัฐมนตรีพ้นจากตำแหน่ง'}]};
    } else {
      const cabinet={...r.cabinet};
      Object.keys(cabinet).forEach(mid=>{ if(cabinet[mid]===targetId) delete cabinet[mid]; });
      update.cabinet=cabinet;
      update.coalitionParties=computeCoalitionSatisfaction({...r,cabinet},cabinet);
      update.currentEffectResult={text:`ศาลรัฐธรรมนูญวินิจฉัยว่า ${targetSlot?targetSlot.name:''} มีความผิดจริง เสียตำแหน่งรัฐมนตรีทันที`,tags:[{sign:'neg',text:`${targetSlot?targetSlot.name:''} เสียตำแหน่งรัฐมนตรี`}]};
    }
  } else {
    const filerSlot=r.slots.find(s=>s.id===filedBy);
    const popularity={}; Object.keys(r.popularity||{}).forEach(k=>{ popularity[k]={...(r.popularity[k]||{})}; });
    popularity[filedBy]=popularity[filedBy]||{north:0,isaan:0,central:0,bangkok:0,south:0};
    REGIONS.forEach(reg=>{ popularity[filedBy][reg.id]=clamp((popularity[filedBy][reg.id]||0)-8,-60,60); });
    update.popularity=popularity;
    update.currentEffectResult={text:`ศาลรัฐธรรมนูญยกคำร้อง — ${targetSlot?targetSlot.name:''} ไม่มีความผิด`,tags:[{sign:'neg',text:`ความนิยม ${filerSlot?filerSlot.name:'ผู้ยื่น'} -8`}]};
  }
  roomRef().update(update);
}

function proposeBill(category,direction){
  const r=ui.room; const mine=mySlot();
  if(!mine) return;
  const pending=r.pendingBills||[];
  if(pending.length>=6) return;
  if(pending.some(b=>b.proposerId===mine.id)) return;
  const bill={
    id:'b'+Math.random().toString(36).slice(2,9),
    proposerId:mine.id, category, direction, stage:'amend',
    amendments:[], respondedToAmend:[mine.id],
    selectVotes:{}, passVotes:{},
  };
  roomRef().update({pendingBills:[...pending,bill]});
}
function otherActiveSlotIds(r,excludeId){
  return r.slots.filter(s=>s.enabled!==false && s.id!==excludeId).map(s=>s.id);
}
function maybeAdvanceAmendStage(r,bill){
  const others=otherActiveSlotIds(r,bill.proposerId);
  const allResponded=others.every(id=>bill.respondedToAmend.includes(id));
  if(!allResponded) return bill;
  const intensities=[...new Set(bill.amendments.map(a=>a.intensity))];
  return {...bill, stage: intensities.length ? 'select' : 'pass'};
}
function submitAmendment(billId,intensity){
  const r=ui.room; const mine=mySlot(); if(!mine) return;
  const bills=(r.pendingBills||[]).map(b=>{
    if(b.id!==billId || b.proposerId===mine.id || b.respondedToAmend.includes(mine.id)) return b;
    const updated={...b, amendments:[...b.amendments,{proposerId:mine.id,intensity}], respondedToAmend:[...b.respondedToAmend,mine.id]};
    return maybeAdvanceAmendStage(r,updated);
  });
  roomRef().update({pendingBills:bills});
}
function passOnAmendment(billId){
  const r=ui.room; const mine=mySlot(); if(!mine) return;
  const bills=(r.pendingBills||[]).map(b=>{
    if(b.id!==billId || b.proposerId===mine.id || b.respondedToAmend.includes(mine.id)) return b;
    const updated={...b, respondedToAmend:[...b.respondedToAmend,mine.id]};
    return maybeAdvanceAmendStage(r,updated);
  });
  roomRef().update({pendingBills:bills});
}
function castSelectVote(billId,intensity){
  const r=ui.room; const mine=mySlot(); if(!mine) return;
  const bills=(r.pendingBills||[]).map(b=>{
    if(b.id!==billId || b.stage!=='select') return b;
    const selectVotes={...b.selectVotes,[mine.id]:intensity};
    const allVoted=r.slots.filter(s=>s.enabled!==false).every(s=>selectVotes[s.id]!==undefined);
    if(!allVoted) return {...b,selectVotes};
    const winner=tallySelectVote({...b,selectVotes},r.slots,r.lastElection.results,r.pm);
    return {...b,selectVotes,selectedIntensity:winner,stage:'pass'};
  });
  roomRef().update({pendingBills:bills});
}
function castPassVote(billId,vote){
  const r=ui.room; const mine=mySlot(); if(!mine) return;
  let resolved=null;
  const bills=(r.pendingBills||[]).map(b=>{
    if(b.id!==billId || b.stage!=='pass') return b;
    const passVotes={...b.passVotes,[mine.id]:vote};
    const allVoted=r.slots.filter(s=>s.enabled!==false).every(s=>passVotes[s.id]!==undefined);
    if(!allVoted) return {...b,passVotes};
    const passed=tallyPassVote({...b,passVotes},r.slots,r.lastElection.results,r.pm);
    resolved={bill:{...b,passVotes},passed};
    return {...b,passVotes,stage:'done'};
  });
  const update={pendingBills:bills.filter(b=>b.stage!=='done')};
  if(resolved){
    const intensity=resolved.bill.selectedIntensity || (resolved.bill.amendments.length?resolved.bill.amendments[0].intensity:'mild');
    if(resolved.passed){
      update.activeLaws={...r.activeLaws,[resolved.bill.category]:{direction:resolved.bill.direction,intensity,proposerId:resolved.bill.proposerId}};
    } else if(r.coalitionParties.some(p=>p.id===resolved.bill.proposerId)){
      update.national={...r.national,trust:clamp(r.national.trust-2)};
    }
  }
  roomRef().update(update);
}

function nextTurn(){
  const r=ui.room;
  if(r.pendingPmDisqualification){
    const disqualifiedId=r.pendingPmDisqualification.targetId;
    const concededPm=[disqualifiedId];
    const next=nextPmCandidate({...r,concededPm});
    if(!next){
      roomRef().update({collapsed:true,phase:'term_summary',pendingPmDisqualification:null});
      return;
    }
    if(next.seats>=MAJORITY){
      const coalitionParties=[{id:next.id,satisfaction:100}];
      roomRef().update({phase:'cabinet',pm:next.id,coalitionSlots:[next.id],coalitionParties,cabinet:{},invitations:{},concededPm,pendingPmDisqualification:null,midTermReshuffle:true,pendingBills:[]});
    } else {
      roomRef().update({phase:'coalition',pm:next.id,coalitionSlots:[],coalitionParties:[],invitations:{},cabinet:{},concededPm,pendingPmDisqualification:null,midTermReshuffle:true,pendingBills:[]});
    }
    return;
  }
  const lawEff=applyActiveLawEffects(r);
  if(r.pendingCollapse){
    const debt=applyPublicDebt(Math.max(0,lawEff.treasury-10),r.publicDebt,r.activeLaws);
    roomRef().update({collapsed:true,phase:'term_summary',treasury:debt.treasury,national:lawEff.national,popularity:lawEff.popularity,regionLeaning:lawEff.regionLeaning,publicDebt:debt.publicDebt,pendingBills:[]});
    return;
  }
  if(r.turn>=r.turnsPerTerm){
    const debt=applyPublicDebt(lawEff.treasury,r.publicDebt,r.activeLaws);
    roomRef().update({collapsed:false,phase:'term_summary',treasury:debt.treasury,national:lawEff.national,popularity:lawEff.popularity,regionLeaning:lawEff.regionLeaning,publicDebt:debt.publicDebt,pendingBills:[]});
    return;
  }
  const crisis=computeDeficitCrisis(lawEff.treasury,r.deficitStreak||0,lawEff.national);
  const debt=applyPublicDebt(lawEff.treasury,r.publicDebt,r.activeLaws);
  const nextR={...r,turn:r.turn+1,national:crisis.national,treasury:debt.treasury,popularity:lawEff.popularity,regionLeaning:lawEff.regionLeaning,publicDebt:debt.publicDebt};
  const {event,ownerSlot}=drawEventForRoom(nextR);
  roomRef().update({turn:r.turn+1,national:crisis.national,deficitStreak:crisis.deficitStreak,currentEvent:event,currentEventOwnerSlot:ownerSlot,currentEffectResult:null,queuedEvent:null,noConfidenceVotes:{},treasury:debt.treasury,popularity:lawEff.popularity,regionLeaning:lawEff.regionLeaning,publicDebt:debt.publicDebt,pendingBills:[]});
}

function startNewTerm(){
  const r=ui.room;
  const slots=r.slots.map(s=>{
    if(!s.claimedBy){
      const drifted={...s.policy};
      ['economy','reform','security'].forEach(axis=>{ drifted[axis]=clamp(drifted[axis]+(Math.random()*10-5),-100,100); });
      return {...s,policy:drifted,submitted:false,budget:{north:0,isaan:0,central:0,bangkok:0,south:0}};
    }
    return {...s,submitted:false,budget:{north:0,isaan:0,central:0,bangkok:0,south:0}};
  });
  roomRef().update({phase:'campaign',term:r.term+1,slots,electionLock:false,invitations:{},pendingCollapse:false,oppositionActions:{},queuedEvent:null,deficitStreak:0,dissolvedByPm:false,pendingPmDisqualification:null,pendingBills:[]});
}

function resetRoomToLobby(){
  if(!isHost()) return;
  if(!confirm('รีเซ็ตเกมกลับไปหน้าเลือกพรรค? ความคืบหน้าของรอบนี้จะหายทั้งหมด')) return;
  const r=ui.room;
  const emptyBudget={north:0,isaan:0,central:0,bangkok:0,south:0};
  const slots=r.slots.map((s,i)=>({
    ...s,
    policy:{...PARTY_TEMPLATES[Number(s.id.slice(1))].policy},
    billStance:{...PARTY_TEMPLATES[Number(s.id.slice(1))].billStance},
    submitted:false,
    budget:{...emptyBudget},
    ready:false,
  }));
  const emptyPop={north:0,isaan:0,central:0,bangkok:0,south:0};
  roomRef().update({
    phase:'lobby', slots, term:1, treasury:200, national:{economy:50,trust:50,unrest:20},
    popularity:Object.fromEntries(slots.map(s=>[s.id,{...emptyPop}])),
    oppositionActions:{}, queuedEvent:null,
    lastElection:null, pm:null, coalitionSlots:[], invitations:{}, cabinet:{}, coalitionParties:[],
    turn:1, turnsPerTerm:16, usedEventIds:[], currentEvent:null, currentEventOwnerSlot:null, currentEffectResult:null,
    collapsed:false, electionLock:false, pendingCollapse:false, deficitStreak:0, concededPm:[],
    decisionHistory:[], noConfidenceVotes:{},
    corruptionIncidents:[], pendingPmDisqualification:null, midTermReshuffle:false, dissolvedByPm:false,
    pendingBills:[], activeLaws:{fiscal:null,social:null,security:null}, publicDebt:0,
  });
}

/* ---------- host-only automation for AI-controlled turns ---------- */
let automationBusy=false;
let automationWatchdog=null;

// Safety net: no automated step should legitimately take more than 6s.
// If automationBusy is ever left stuck true (e.g. an unexpected error fired
// mid-computation before we could reset it), this clears it so the host's
// browser can keep driving AI-controlled parties instead of freezing forever.
function armAutomationWatchdog(){
  if(automationWatchdog) clearTimeout(automationWatchdog);
  automationWatchdog=setTimeout(()=>{ automationBusy=false; },6000);
}
function releaseAutomation(){
  automationBusy=false;
  if(automationWatchdog){ clearTimeout(automationWatchdog); automationWatchdog=null; }
  // An automation step's own write (e.g. coalition -> cabinet) can race the
  // snapshot it triggers: that snapshot may arrive while automationBusy is
  // still true and get silently dropped by the busy-guard, stranding the
  // room in a phase that needed a further automated step with nothing left
  // to re-trigger it. Re-check right after clearing the flag so any phase
  // change we just made is picked up immediately instead of relying on a
  // snapshot that might already have been missed.
  runHostAutomation();
}

function runHostAutomation(){
  if(!isHost()||automationBusy||!ui.room) return;
  const r=ui.room;

  if(r.phase==='coalition' && !r.slots.find(s=>s.id===r.pm).claimedBy){
    const already = Object.keys(r.invitations||{}).length>0 || (r.coalitionSlots&&r.coalitionSlots.length>0);
    if(!already){
      automationBusy=true;
      armAutomationWatchdog();
      setTimeout(()=>{
        try{
          const pmSlot=r.slots.find(s=>s.id===r.pm);
          const others=r.slots.filter(s=>s.id!==r.pm && (r.lastElection.results.find(x=>x.id===s.id)?.seats||0)>0)
            .sort((a,b)=>(r.lastElection.results.find(x=>x.id===b.id)?.seats||0)-(r.lastElection.results.find(x=>x.id===a.id)?.seats||0));
          let total=(r.lastElection.results.find(x=>x.id===r.pm)?.seats||0);
          const invitations={};
          for(const s of others){
            if(total>=MAJORITY) break;
            const d=policyDistance(pmSlot.policy,s.policy);
            invitations[s.id]= d<1.3 ? 'accepted' : 'declined';
            if(invitations[s.id]==='accepted') total+=(r.lastElection.results.find(x=>x.id===s.id)?.seats||0);
          }
          if(total<MAJORITY){
            concedePmCandidacy();
            releaseAutomation();
            return;
          }
          const acceptedIds=Object.entries(invitations).filter(([k,v])=>v==='accepted').map(([k])=>k);
          const coalitionSlots=[r.pm,...acceptedIds];
          const coalitionParties=coalitionSlots.map(id=>({id,satisfaction:id===r.pm?100:50}));
          roomRef().update({invitations,phase:'cabinet',coalitionSlots,coalitionParties,cabinet:{}}).catch(()=>{}).finally(releaseAutomation);
        } catch(e){ console.error('AI coalition automation failed:',e); releaseAutomation(); }
      },700);
    }
    return;
  }

  if(r.phase==='cabinet' && !r.slots.find(s=>s.id===r.pm).claimedBy){
    const noneAssigned = Object.keys(r.cabinet||{}).length===0;
    if(noneAssigned){
      automationBusy=true;
      armAutomationWatchdog();
      setTimeout(()=>{
        try{
          const parties=r.coalitionSlots.map(id=>({id,seats:(r.lastElection.results.find(x=>x.id===id)?.seats||0)}));
          const totalSeats=parties.reduce((s,p)=>s+p.seats,0)||1;
          const assigned={}; parties.forEach(p=>assigned[p.id]=0);
          const sorted=[...MINISTRIES].sort((a,b)=>b.weight-a.weight);
          const cabinet={};
          sorted.forEach(m=>{
            let best=null,bestScore=Infinity;
            parties.forEach(p=>{ const target=p.seats/totalSeats; const ratio=target>0?(assigned[p.id]/TOTAL_WEIGHT)/target:Infinity; if(ratio<bestScore){bestScore=ratio;best=p;} });
            cabinet[m.id]=best.id; assigned[best.id]+=m.weight;
          });
          const isReshuffle=!!r.midTermReshuffle;
          const coalitionParties=computeCoalitionSatisfaction(r,cabinet);
          const nextR={...r,cabinet,coalitionParties,usedEventIds:isReshuffle?r.usedEventIds:[]};
          const {event,ownerSlot}=drawEventForRoom(nextR);
          roomRef().update({
            cabinet,coalitionParties,phase:'governing',
            turn: isReshuffle ? r.turn : 1,
            usedEventIds: isReshuffle ? r.usedEventIds : [],
            currentEffectResult:null,currentEvent:event,currentEventOwnerSlot:ownerSlot,
            decisionHistory:[],noConfidenceVotes:{},midTermReshuffle:false,pendingBills:[],
          }).catch(()=>{}).finally(releaseAutomation);
        } catch(e){ console.error('AI cabinet automation failed:',e); releaseAutomation(); }
      },700);
    }
    return;
  }

  if(r.phase==='governing'){
    if(r.currentEvent && r.currentEvent.id==='noconf' && !r.currentEffectResult){
      const votes=r.noConfidenceVotes||{};
      const missingAiVoter=r.coalitionSlots.map(id=>r.slots.find(s=>s.id===id)).find(s=>s&&!s.claimedBy&&votes[s.id]===undefined);
      if(missingAiVoter){
        automationBusy=true;
        armAutomationWatchdog();
        setTimeout(()=>{
          try{
            const choices=r.currentEvent.choices;
            const scored=choices.map((c,i)=>{
              const eff=computeNoConfidenceEffect(c.effect,i,r.decisionHistory);
              return {i,score:(eff.trust||0)*2-(eff.treasury<0?Math.abs(eff.treasury)*0.3:0)+(Math.random()*10-5)};
            });
            scored.sort((a,b)=>b.score-a.score);
            castNoConfidenceVote(scored[0].i,missingAiVoter.id);
          } catch(e){ console.error('AI no-confidence vote failed:',e); }
          finally { releaseAutomation(); }
        },700);
        return;
      }
      const allVoted=r.coalitionSlots.every(id=>votes[id]!==undefined);
      if(allVoted){
        automationBusy=true;
        armAutomationWatchdog();
        setTimeout(()=>{
          try{ resolveNoConfidenceVote(); }
          catch(e){ console.error('No-confidence vote resolution failed:',e); }
          finally { releaseAutomation(); }
        },500);
      }
      return;
    }
    const ownerSlot=r.slots.find(s=>s.id===r.currentEventOwnerSlot);
    if(ownerSlot && !ownerSlot.claimedBy){
      automationBusy=true;
      armAutomationWatchdog();
      setTimeout(()=>{
        try{
          if(!r.currentEffectResult){
            const choices=r.currentEvent.choices;
            const scored=choices.map((c,i)=>({i,score:(c.effect.trust||0)*2-(c.effect.treasury<0?Math.abs(c.effect.treasury)*0.3:0)+(Math.random()*10-5)}));
            scored.sort((a,b)=>b.score-a.score);
            chooseEvent(scored[0].i);
          } else {
            nextTurn();
          }
        } catch(e){ console.error('AI governing automation failed:',e); }
        finally { releaseAutomation(); }
      },900);
    }
  }
}

/* ---------- init ---------- */
render();
</script>
